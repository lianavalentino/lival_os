<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVAL OS — Superpowers Kanban</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-done: #10b981;
            --color-progress: #f59e0b;
            --color-todo: #6b7280;
            --color-card-bg: #ffffff;
            --color-column-bg: #f3f4f6;
            --color-border: #e5e7eb;
            --color-text: #1f2937;
            --color-text-light: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--color-text);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--color-text-light);
            font-size: 14px;
        }

        .phase-section {
            margin-bottom: 40px;
        }

        .phase-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            padding: 10px 0;
            border-bottom: 2px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .phase-title .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.done {
            background: #d1fae5;
            color: var(--color-done);
        }

        .status-badge.progress {
            background: #fef3c7;
            color: var(--color-progress);
        }

        .status-badge.todo {
            background: #f3f4f6;
            color: var(--color-todo);
        }

        .columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .column {
            background: var(--color-column-bg);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 15px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .column-header {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 15px;
            color: var(--color-text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .column-count {
            background: var(--color-border);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            color: var(--color-text-light);
        }

        .cards {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 200px;
        }

        .card {
            background: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s ease;
            font-size: 13px;
            line-height: 1.4;
        }

        .card:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .card-title {
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--color-text);
        }

        .card-notes {
            color: var(--color-text-light);
            font-size: 12px;
            line-height: 1.3;
        }

        .empty-column {
            color: var(--color-text-light);
            text-align: center;
            padding: 20px;
            font-size: 12px;
        }

        .phase-summary {
            background: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            padding: 12px;
            font-size: 13px;
            color: var(--color-text-light);
            margin-bottom: 20px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        .summary-table td, .summary-table th {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--color-border);
            font-size: 13px;
        }

        .summary-table th {
            font-weight: 600;
            background: var(--color-column-bg);
        }

        .summary-table .phase-cell {
            font-weight: 600;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            border: 1px solid var(--color-border);
            color: var(--color-text);
        }

        button:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transform: translateY(-1px);
        }

        button.primary {
            background: var(--color-done);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: #059669;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🦸 LIVAL OS — Superpowers Kanban</h1>
            <p class="subtitle">Track Phase 0–4 alignment and implementation progress</p>
        </header>

        <div id="kanban-board"></div>

        <table class="summary-table">
            <thead>
                <tr>
                    <th>Phase</th>
                    <th>Status</th>
                    <th>Files Changed</th>
                    <th>Key Deliverable</th>
                </tr>
            </thead>
            <tbody id="summary-tbody">
            </tbody>
        </table>
    </div>

    <div class="controls">
        <button onclick="resetBoard()">Reset Board</button>
        <button class="primary" onclick="exportData()">Export Data</button>
    </div>

    <script>
        const PHASES = [
            {
                id: 0,
                name: 'Docs & Framework Decision',
                status: 'done',
                tasks: [
                    { id: '0-1', title: 'Confirm Vite SPA vs. Next.js', status: 'done', notes: 'Decision: stay Vite. Preserve working code.' },
                    { id: '0-2', title: 'Fix CLAUDE.md Tailwind claim', status: 'done', notes: 'Removed false "Tailwind CSS" claim (179e658).' },
                    { id: '0-3', title: 'Add PRD Alignment section', status: 'done', notes: 'Records Vite decision + references live docs.' },
                    { id: '0-4', title: 'Document framework decision', status: 'done', notes: 'Spec: 2026-06-16-prd-phase0-1-alignment-design.md' }
                ],
                summary: 'Framework decision locked in docs.'
            },
            {
                id: 1,
                name: 'Supabase Migration — Planning & Integration Tables',
                status: 'done',
                tasks: [
                    { id: '1-1', title: 'Create migration 002 SQL', status: 'done', notes: '6 new tables: task_updates, daily_plans, weekly_plans, automation_runs, integrations, file_changes' },
                    { id: '1-2', title: 'Add indexes & RLS', status: 'done', notes: '6 indexes, 6 owner policies, 3 triggers' },
                    { id: '1-3', title: 'Verify no collisions', status: 'done', notes: 'Zero table/policy name dupes vs. migration 001.' },
                    { id: '1-4', title: 'Test build/lint', status: 'done', notes: 'npm run build, npm run lint pass.' },
                    { id: '1-5', title: 'Commit migration file', status: 'done', notes: 'Commit 0ed3bac. Ready for manual application via Supabase dashboard.' }
                ],
                summary: '6 new tables, RLS, ready for manual apply.'
            },
            {
                id: 2,
                name: 'UI Extraction & Repository Wiring',
                status: 'progress',
                tasks: [
                    { id: '2-1', title: 'Extract sidebar', status: 'todo', notes: 'src/components/sidebar.tsx. Navigator for all views.' },
                    { id: '2-2', title: 'Extract command center', status: 'todo', notes: 'src/components/views/CommandCenter.tsx. Main dashboard.' },
                    { id: '2-3', title: 'Extract daily planner', status: 'todo', notes: 'Still inline in App.tsx, but read/write wired to daily_plans (402715a).' },
                    { id: '2-4', title: 'Extract weekly planner', status: 'todo', notes: 'Still inline in App.tsx, but read/write wired to weekly_plans (d615ab7).' },
                    { id: '2-5', title: 'Extract board view', status: 'todo', notes: 'Jira-like task columns.' },
                    { id: '2-6', title: 'Extract projects view', status: 'todo', notes: 'Project list/grid.' },
                    { id: '2-7', title: 'Extract task detail', status: 'todo', notes: 'Still inline in App.tsx, but task_updates history wired (55bc1bc).' },
                    { id: '2-8', title: 'Add repository methods', status: 'done', notes: 'upsertDailyPlan/upsertWeeklyPlan/appendTaskUpdate on both repos (98a26c1).' },
                    { id: '2-9', title: 'Add types', status: 'done', notes: 'TaskUpdate/DailyPlan/WeeklyPlan + inputs added to src/types.ts (32bff43).' },
                    { id: '2-10', title: 'Refactor App.tsx', status: 'todo', notes: 'Not started. App.tsx grew larger after wiring landed inline.' },
                    { id: '2-11', title: 'Test all views render', status: 'done', notes: 'Manual smoke per task; vitest covers mappers/helpers (a518c96..0800641).' }
                ],
                summary: 'Repository wiring shipped (separate plan, 2026-06-16); component extraction not started.'
            },
            {
                id: 3,
                name: 'Ingestion Endpoints (Edge Functions)',
                status: 'progress',
                tasks: [
                    { id: '3-1', title: 'Edge function: quick-capture', status: 'done', notes: 'Deployed 2026-06-17 (e7b89ed). --no-verify-jwt, bearer-gated.' },
                    { id: '3-2', title: 'Edge function: time-entry', status: 'done', notes: 'Deployed 2026-06-17 (99c1eab). external_ref idempotency via 003 migration (9c95177).' },
                    { id: '3-3', title: 'Edge function: file-change', status: 'todo', notes: 'Deferred. Not started — no folder under supabase/functions/.' },
                    { id: '3-4', title: 'Edge function: activity-event', status: 'todo', notes: 'Deferred. Not started — no folder under supabase/functions/.' },
                    { id: '3-5', title: 'Bearer secret verification', status: 'done', notes: 'All endpoints require LIVAL_INGEST_SECRET.' },
                    { id: '3-6', title: 'JSON response helpers', status: 'done', notes: 'Consistent success/error response format.' },
                    { id: '3-7', title: 'Deno test harness', status: 'done', notes: 'Unit tests for edge functions.' },
                    { id: '3-8', title: 'Supabase CLI project init', status: 'done', notes: 'Local dev + CI/CD setup.' },
                    { id: '3-9', title: 'Claude Code hook integration', status: 'done', notes: 'Hook calls edge function on task completion.' },
                    { id: '3-10', title: 'Apple Shortcut example', status: 'done', notes: 'Shortcut that POSTs time entries to endpoint.' }
                ],
                summary: 'Hands-free capture from dev tools.'
            },
            {
                id: 4,
                name: 'Deployment & Polish',
                status: 'todo',
                tasks: [
                    { id: '4-1', title: 'Update .env.example', status: 'todo', notes: 'Document all required env vars (no real values).' },
                    { id: '4-2', title: 'Supabase auth config', status: 'todo', notes: 'Verify email/password provider is enabled.' },
                    { id: '4-3', title: 'Vercel project setup', status: 'todo', notes: 'Connect GitHub repo, configure deployment.' },
                    { id: '4-4', title: 'Environment variables', status: 'todo', notes: 'Set VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, etc. on Vercel.' },
                    { id: '4-5', title: 'Build verification', status: 'todo', notes: 'npm run build produces dist/.' },
                    { id: '4-6', title: 'RLS smoke test', status: 'todo', notes: 'Verify single user cannot see other user data.' },
                    { id: '4-7', title: 'Auth smoke test', status: 'todo', notes: 'Create account, log in, log out.' },
                    { id: '4-8', title: 'Ingestion smoke test', status: 'todo', notes: 'Call edge functions from curl. Verify rows appear.' },
                    { id: '4-9', title: 'Deploy', status: 'todo', notes: 'Push to Vercel. Visit app.' },
                    { id: '4-10', title: 'Production docs', status: 'todo', notes: 'Update README.md with deployment instructions.' }
                ],
                summary: 'Live, working, user-ready app.'
            }
        ];

        let boardData = [...PHASES];
        let draggedCard = null;

        function getStorageKey(taskId) {
            return `kanban_task_${taskId}`;
        }

        function loadTaskStatus(taskId, defaultStatus) {
            const stored = localStorage.getItem(getStorageKey(taskId));
            return stored || defaultStatus;
        }

        function saveTaskStatus(taskId, status) {
            localStorage.setItem(getStorageKey(taskId), status);
        }

        function clearStorage() {
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith('kanban_task_')) {
                    localStorage.removeItem(key);
                }
            });
        }

        function resetBoard() {
            if (confirm('Reset all changes? This will clear your local storage.')) {
                clearStorage();
                location.reload();
            }
        }

        function exportData() {
            const data = PHASES.map(phase => ({
                phase: phase.id,
                name: phase.name,
                tasks: phase.tasks.map(t => ({
                    title: t.title,
                    status: loadTaskStatus(t.id, t.status),
                    notes: t.notes
                }))
            }));
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `kanban-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function renderBoard() {
            const board = document.getElementById('kanban-board');
            let html = '';

            boardData.forEach(phase => {
                const tasks = phase.tasks.map(t => ({
                    ...t,
                    status: loadTaskStatus(t.id, t.status)
                }));

                const done = tasks.filter(t => t.status === 'done').length;
                const progress = tasks.filter(t => t.status === 'progress').length;
                const todo = tasks.filter(t => t.status === 'todo').length;

                html += `
                    <div class="phase-section">
                        <div class="phase-title">
                            Phase ${phase.id}: ${phase.name}
                            <span class="status-badge ${phase.status}">${phase.status.toUpperCase()}</span>
                        </div>
                        <div class="phase-summary">
                            ✅ ${done} done • 🔄 ${progress} in progress • ⏳ ${todo} todo
                        </div>
                        <div class="columns">
                            ${renderColumn(tasks, 'done', `Done (${done})`)}
                            ${renderColumn(tasks, 'progress', `In Progress (${progress})`)}
                            ${renderColumn(tasks, 'todo', `Todo (${todo})`)}
                        </div>
                    </div>
                `;
            });

            board.innerHTML = html;
            attachDragListeners();
        }

        function renderColumn(tasks, status, label) {
            const columnTasks = tasks.filter(t => t.status === status);
            const statusEmoji = { done: '✅', progress: '🔄', todo: '⏳' }[status];
            const statusClass = { done: 'done', progress: 'progress', todo: 'todo' }[status];

            let html = `
                <div class="column" data-status="${status}">
                    <div class="column-header">
                        <span>${statusEmoji} ${label}</span>
                        <span class="column-count">${columnTasks.length}</span>
                    </div>
                    <div class="cards" data-status="${status}">
            `;

            if (columnTasks.length === 0) {
                html += `<div class="empty-column">No tasks</div>`;
            } else {
                columnTasks.forEach(task => {
                    html += `
                        <div class="card fade-in" draggable="true" data-id="${task.id}" data-status="${status}">
                            <div class="card-title">${task.title}</div>
                            <div class="card-notes">${task.notes}</div>
                        </div>
                    `;
                });
            }

            html += `
                    </div>
                </div>
            `;

            return html;
        }

        function attachDragListeners() {
            const cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                card.addEventListener('dragstart', e => {
                    draggedCard = card;
                    card.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                card.addEventListener('dragend', e => {
                    card.classList.remove('dragging');
                    draggedCard = null;
                });
            });

            const columns = document.querySelectorAll('.cards');

            columns.forEach(column => {
                column.addEventListener('dragover', e => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    column.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                });

                column.addEventListener('dragleave', e => {
                    column.style.backgroundColor = '';
                });

                column.addEventListener('drop', e => {
                    e.preventDefault();
                    column.style.backgroundColor = '';

                    if (draggedCard) {
                        const newStatus = column.getAttribute('data-status');
                        const taskId = draggedCard.getAttribute('data-id');
                        const oldStatus = draggedCard.getAttribute('data-status');

                        if (newStatus !== oldStatus) {
                            saveTaskStatus(taskId, newStatus);
                        }

                        column.appendChild(draggedCard);
                        draggedCard.setAttribute('data-status', newStatus);
                        renderBoard();
                    }
                });
            });
        }

        function renderSummary() {
            const tbody = document.getElementById('summary-tbody');
            let html = '';

            PHASES.forEach(phase => {
                const tasks = phase.tasks.map(t => ({
                    ...t,
                    status: loadTaskStatus(t.id, t.status)
                }));
                const done = tasks.filter(t => t.status === 'done').length;
                const total = tasks.length;
                const statusText = phase.status === 'done' ? '✅ Done' :
                                   phase.status === 'progress' ? '🔄 In Progress' : '⏳ Todo';

                html += `
                    <tr>
                        <td class="phase-cell">Phase ${phase.id}</td>
                        <td>${statusText}</td>
                        <td>${total} tasks</td>
                        <td>${phase.summary}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        // Initialize
        renderBoard();
        renderSummary();
    </script>
</body>
</html>
